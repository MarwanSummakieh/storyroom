# Full local stack in Docker: web + realtime + Postgres.
#
#   docker compose up --build        # build + run everything
#   open http://localhost:3000
#
# Just need Postgres for host-based `pnpm dev`?  ->  docker compose up postgres
#
# Note: the app is reached at http://localhost:3000 because the web container
# publishes port 3000 to the host. "localhost" here means the container's
# published port, not a host process.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: storyroom
      POSTGRES_USER: storyroom
      POSTGRES_PASSWORD: storyroom
    ports:
      - "5432:5432"
    volumes:
      - storyroom-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyroom -d storyroom"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: apply the Prisma schema, then exit. Other services wait for it.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "db:push"]
    environment:
      DATABASE_URL: postgresql://storyroom:storyroom@postgres:5432/storyroom?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  realtime:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://storyroom:storyroom@postgres:5432/storyroom?schema=public
      COLLAB_PORT: "1234"
    ports:
      - "1234:1234"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Browser connects to the realtime container's published port.
        NEXT_PUBLIC_COLLAB_URL: ws://localhost:1234
    environment:
      DATABASE_URL: postgresql://storyroom:storyroom@postgres:5432/storyroom?schema=public
      NEXT_PUBLIC_COLLAB_URL: ws://localhost:1234
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  storyroom-postgres:
